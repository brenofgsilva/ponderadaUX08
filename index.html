<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hiding</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #f6f1e8;
      }
      #stage {
        width: 100vw;
        height: 100vh;
        background: #fffaf3;
      }
    </style>
  </head>
  <body>
    <div id="stage" aria-label="Scene"></div>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="scene.js"></script>
  </body>
</html>
